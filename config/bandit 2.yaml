# Bandit configuration for Claudette security scanning
# https://bandit.readthedocs.io/en/latest/config.html

# Exclude test files and specific patterns
exclude_dirs:
  - '/tests'
  - '/test_*'
  - '/.pytest_cache'
  - '/build'
  - '/dist'
  - '/.venv'

# Skip specific test IDs that are acceptable for this project
skips:
  # B101: Test for use of assert - acceptable in tests and development
  # B603: subprocess call - check for execution of untrusted input (we control all subprocess calls)
  # B607: Starting a process with a partial executable path (we use claude CLI which should be in PATH)
  
tests:
  - B101
  - B603
  - B607

# Confidence levels: HIGH, MEDIUM, LOW
# Only report HIGH and MEDIUM confidence issues
confidence: 
  - HIGH
  - MEDIUM

# Severity levels to report
severity:
  - HIGH
  - MEDIUM
  - LOW