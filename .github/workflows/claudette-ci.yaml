name: Claudette CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18.x, 20.x]
        
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'
        
    - name: Install dependencies
      run: npm ci
      
    - name: Build TypeScript
      run: npm run build
      
    - name: Run unit tests
      run: npm test
      
    - name: Run RAG integration tests (CI-safe)
      run: |
        echo "Running RAG integration tests..."
        if npm run test:rag; then
          echo "✅ RAG tests passed"
        else
          echo "⚠️ RAG tests failed (likely due to CI environment limitations)"
          echo "This is expected in CI environments without Docker/external services"
        fi
      continue-on-error: true
      
    - name: Validate package structure
      run: |
        node -e "console.log('Claudette v' + require('./package.json').version)"
        npm pack --dry-run

  lint:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20.x'
        cache: 'npm'
        
    - name: Install dependencies
      run: npm ci
      
    - name: TypeScript validation
      run: npm run validate
      
    - name: Check for TypeScript errors
      run: npx tsc --noEmit --strict